server:
  port: 8080

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      server:
        webmvc:
          routes:
            - id: customer-service-route
              uri: lb://customer-service
              predicates:
                - Path=/api/customers/**

            - id: workorder-service-route
              uri: lb://workorder-service
              predicates:
                - Path=/api/workorders/**

            - id: pdi-service-route
              uri: lb://pdi-service
              predicates:
                - Path=/api/pdi-checklists/**

            - id: report-service-route
              uri: lb://report-service
              predicates:
                - Path=/api/reports/**

eureka:
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: http://localhost:8761/eureka/

  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include:
          - health
          - info